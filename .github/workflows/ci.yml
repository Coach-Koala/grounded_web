name: ci

on:
  push:
    branches: [main]
  pull_request:

# All actions pinned to commit SHAs (threat model T3).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Flip to "" when the custom domain (getgroundedhealth.com) goes live (Batch 5).
  BASE_PATH: /grounded_web
  NEXT_PUBLIC_LEADS_ENDPOINT: https://demo.getgroundedhealth.com/api/leads
  NEXT_PUBLIC_CONTACT_EMAIL: hello@getgroundedhealth.com
  NEXT_PUBLIC_APP_URL: https://demo.getgroundedhealth.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      - name: Content gates (pricing, naming, CNAME, source maps, hex literals)
        run: scripts/content-gates.sh out
      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: out

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Lighthouse and lychee serve/resolve out/ at the root, so build
      # without a base path (links are root-relative in this build).
      - run: npm run build
        env:
          BASE_PATH: ""
      # No --include-fragments: lychee cannot resolve fragments through
      # directory indexes (/#scorecard -> out/index.html), false-failing
      # every anchor link. Whole-file link checking still applies.
      - name: Internal link check
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: --offline --root-dir "${{ github.workspace }}/out" "out/**/*.html"
          fail: true
      - name: Lighthouse CI (a11y >= 0.95, perf >= 0.90)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build, lighthouse]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
